<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Extension Explainer</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <span class="header-icon">📖</span>
    <h1>Extension Explainer</h1>
  </div>

  <div class="status-row">
    <span id="status-dot" class="status-dot"></span>
    <span id="status-text" class="status-text">Checking...</span>
  </div>

  <div class="field-group">
    <label for="provider">Provider</label>
    <select id="provider">
      <option value="claude">Claude</option>
      <option value="ollama">Ollama</option>
    </select>
  </div>

  <div class="field-group" id="api-key-group">
    <label for="api-key">API Key</label>
    <div class="input-wrapper">
      <input type="password" id="api-key" placeholder="Enter your API key">
      <button type="button" id="toggle-key" class="toggle-btn" title="Show/hide API key">
        <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
          <circle cx="12" cy="12" r="3"></circle>
        </svg>
        <svg id="eye-off-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
          <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"></path>
          <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"></path>
          <line x1="1" y1="1" x2="23" y2="23"></line>
        </svg>
      </button>
    </div>
  </div>

  <button id="save-btn" class="save-btn">Save</button>

  <div id="save-message" class="save-message"></div>

  <div class="footer">
    <a href="#" id="open-options">Open full settings</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
